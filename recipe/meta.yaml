{% set name = "runtimed" %}
{% set version = "2.4.8" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  skip: true  # [py<310]

requirements:
  build:
    # curl is needed only for downloading whl files in build.sh and bld.bat
    - curl
  host:
    - pip
    - python
    - wheel
  run:
    - python
    - pyzmq >=25.0
    - ipykernel >=6.0
    # otool -l ./runtimed/_internals.abi3.so | grep -A 50 LC_LOAD_DYLIB
    # Load command 14
    #      cmd LC_LOAD_DYLIB
    #  cmdsize 56
    #     name /usr/lib/libiconv.2.dylib (offset 24)
    #  time stamp 2 Wed Dec 31 16:00:02 1969
    #  current version 7.0.0
    # compatibility version 7.0.0
    # 7.0.0 -> compatible with libiconv 1.16, 1.17, 1.18
    - libiconv >=1.16,<1.19  # [osx]
    # objdump -p linux//runtimed/_internals.abi3.so
    # Dynamic Section:
    #  RPATH        $ORIGIN/../runtimed.libs
    #  NEEDED       libssl-63597a81.so.3 —> vendored (IGNORE)
    #  NEEDED       libcrypto-c19c2cf8.so.3 —> vendored (IGNORE)
    #  NEEDED       libgcc_s.so.1
    #  NEEDED       libm.so.6 —> system (IGNORE)
    #  NEEDED       libc.so.6 —> system (IGNORE)
    #  NEEDED       ld-linux-x86-64.so.2 —> system (IGNORE)
    - libgcc-ng  # [linux]
    - libstdcxx-ng  # [linux]

test:
  files:
    - test.py
  imports:
    - runtimed
  commands:
    - pip check
    - pytest -v --asyncio-mode=auto test.py
  requires:
    - pip
    - pytest
    - pytest-asyncio

about:
  home: https://pypi.org/project/runtimed
  summary: Python toolkit for Jupyter runtimes, powered by runtimed Rust binaries
  description: |
    Python bindings for the nteract runtime daemon. Execute code, manage kernels, and interact with notebooks programmatically.
    Download the nteract desktop app — it ships the runtimed daemon and gives you a visual interface for your notebooks.
    Using runtimed with agents? The nteract MCP server is built on runtimed and provides a ready-made agentic interface for AI assistants.
    It's also a great example of how to use runtimed in practice.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://pypi.org/project/runtimed
  doc_url: https://pypi.org/project/runtimed

extra:
  recipe-maintainers:
    - Jrice1317
