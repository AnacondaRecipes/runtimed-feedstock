{% set name = "runtimed" %}
{% set version = "2.4.8" %}
# STABLE RELEASE HASH
{% set release_hash = "202605142308" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nteract/nteract/archive/refs/tags/v{{ version }}-stable.{{ release_hash }}.tar.gz
  sha256: a2370774a09dce603583ba29c3d75194d6622d15abd9ec4977e026380e2a8cf0

build:
  number: 0
  script:
    - {{ PYTHON }} -m pip install ./python/runtimed -vv --no-deps --no-build-isolation
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  skip: true  # [py<310]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
  host:
    - pip
    - python
    - wheel
    - maturin >=1.0,<2.0
    - cargo-bundle-licenses ==4.2.0
    # Needed DSOs:
    # libssl.so.3 + libcrypto.so.3
    - openssl {{ openssl }}  # [linux]
  run:
    - python
  run_constrained:
    # kernel
    - ipykernel >=6.0
    # bridge
    - pyzmq >=25.0
    - openssl  # [linux]

# if remaining <= 0:
# >   raise asyncio.TimeoutError(
# E   asyncio.exceptions.TimeoutError: Execution exec-1... did not complete within 0.0s (status=running)
# Unstable tests, randomly failed by timeout:
{% set deselect_tests = " --deselect=python/runtimed/tests/test_session_unit.py::TestNotebookInfo::test_from_dict_file_backed" %}
{% set deselect_tests = deselect_tests + " --deselect=python/runtimed/tests/test_session_unit.py::TestNotebookInfo::test_repr" %}
{% set deselect_tests = deselect_tests + " --deselect=python/runtimed/tests/test_session_unit.py::TestExecutionHandle::test_wait_times_out_with_current_status" %}

test:
  source_files:
    - python/runtimed/tests
  imports:
    - runtimed
  commands:
    - pip check
    - pytest -v --asyncio-mode=auto python/runtimed/tests {{ deselect_tests }}
  requires:
    - pip
    - pytest >=8.0
    - pytest-asyncio >=0.23
    - ipykernel >=6.0
    - pyzmq >=25.0

about:
  home: https://github.com/nteract/nteract/tree/main/python/runtimed
  summary: Python toolkit for Jupyter runtimes, powered by runtimed Rust binaries
  description: |
    Python bindings for the nteract runtime daemon. Execute code, manage kernels, and interact with notebooks programmatically.
    Download the nteract desktop app — it ships the runtimed daemon and gives you a visual interface for your notebooks.
    Using runtimed with agents? The nteract MCP server is built on runtimed and provides a ready-made agentic interface for AI assistants.
    It's also a great example of how to use runtimed in practice.
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  dev_url: https://github.com/nteract/nteract/tree/main/python/runtimed
  doc_url: https://github.com/nteract/nteract/blob/main/python/runtimed/README.md

